<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>小數獨</title>
<style>
:root{
  --bg:#f4f5fb; --panel:#ffffff; --ink:#1f2430; --muted:#8a90a2;
  --line:#d7dae6; --line-strong:#3a4054; --cell:#ffffff; --cell-fixed:#eef0f8;
  --sel:#c7d2fe; --peer:#e8ecfb; --same:#bfdbfe; --accent:#4f46e5;
  --given:#1f2430; --user:#2563eb; --wrong:#dc2626; --hint:#059669;
  --pad:#eef0f8; --pad-ink:#2b3040; --shadow:0 1px 3px rgba(20,24,40,.12);
  --ok:#22c55e;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#12141c; --panel:#1b1e29; --ink:#e8eaf2; --muted:#8a90a2;
    --line:#2c3040; --line-strong:#5b627a; --cell:#1b1e29; --cell-fixed:#232838;
    --sel:#3b3f74; --peer:#242942; --same:#274156; --accent:#818cf8;
    --given:#e8eaf2; --user:#60a5fa; --wrong:#f87171; --hint:#34d399;
    --pad:#232838; --pad-ink:#cdd2e4; --shadow:0 1px 3px rgba(0,0,0,.4);
    --ok:#4ade80;
  }
}
:root[data-theme="light"]{ color-scheme:light; }
:root[data-theme="dark"]{ color-scheme:dark; }
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Segoe UI",Roboto,sans-serif;
  overscroll-behavior:none; -webkit-user-select:none; user-select:none;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
.screen{display:none;flex:1;flex-direction:column;padding:14px 16px 20px;}
.screen.active{display:flex;}

/* ---------- Home ---------- */
.brand{display:flex;align-items:center;gap:10px;margin:8px 2px 18px;}
.brand .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#6366f1,#a855f7);
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px;box-shadow:var(--shadow);}
.brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:.5px;}
.brand small{display:block;color:var(--muted);font-weight:500;font-size:12px;margin-top:1px;}

.continue{width:100%;border:0;border-radius:16px;padding:16px;margin-bottom:18px;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;text-align:left;
  box-shadow:0 6px 18px rgba(79,70,229,.32);cursor:pointer;font-family:inherit;}
.continue .t{font-size:16px;font-weight:700;}
.continue .s{font-size:13px;opacity:.9;margin-top:3px;}

.section-title{font-size:13px;font-weight:700;color:var(--muted);margin:6px 2px 10px;letter-spacing:.4px;}

.diffs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.diff{border:2px solid transparent;background:var(--panel);border-radius:14px;padding:13px 14px;
  text-align:left;cursor:pointer;font-family:inherit;box-shadow:var(--shadow);transition:.12s;}
.diff .d{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle;}
.diff .n{font-size:16px;font-weight:700;color:var(--ink);}
.diff .p{font-size:12px;color:var(--muted);margin-top:4px;}
.diff.sel{border-color:var(--accent);}

.tabs{display:flex;gap:8px;background:var(--panel);padding:4px;border-radius:12px;margin-bottom:14px;box-shadow:var(--shadow);}
.tab{flex:1;border:0;background:transparent;padding:9px;border-radius:9px;font-family:inherit;
  font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;}
.tab.sel{background:var(--accent);color:#fff;}

.infinite-box{background:var(--panel);border-radius:16px;padding:22px 18px;text-align:center;box-shadow:var(--shadow);}
.infinite-box p{color:var(--muted);font-size:13px;margin:0 0 16px;line-height:1.5;}
.btn-primary{border:0;border-radius:12px;background:var(--accent);color:#fff;padding:14px 22px;
  font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 12px rgba(79,70,229,.28);}

.levels{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;}
.lv{position:relative;aspect-ratio:1;border:0;border-radius:12px;background:var(--panel);
  color:var(--ink);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;justify-content:center;}
.lv.done{background:var(--accent);color:#fff;}
.lv.inprog{background:#fff7ed;color:#9a3412;box-shadow:inset 0 0 0 2px #f59e0b,var(--shadow);}
@media (prefers-color-scheme:dark){.lv.inprog{background:#3a2a12;color:#fbbf24;}}
:root[data-theme="dark"] .lv.inprog{background:#3a2a12;color:#fbbf24;}
:root[data-theme="light"] .lv.inprog{background:#fff7ed;color:#9a3412;}
.lv .tm{font-size:9px;font-weight:600;opacity:.85;margin-top:2px;}
.lv .chk{position:absolute;top:4px;right:6px;font-size:10px;}
.more{grid-column:1/-1;border:0;background:transparent;color:var(--accent);font-weight:700;
  font-family:inherit;font-size:14px;padding:12px;cursor:pointer;}

/* ---------- Game ---------- */
.gbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.iconbtn{border:0;background:var(--panel);width:38px;height:38px;border-radius:11px;font-size:18px;
  cursor:pointer;box-shadow:var(--shadow);color:var(--ink);display:grid;place-items:center;}
.gtitle{flex:1;}
.gtitle .a{font-size:15px;font-weight:800;}
.gtitle .b{font-size:12px;color:var(--muted);}
.stat{text-align:right;font-variant-numeric:tabular-nums;}
.stat .a{font-size:16px;font-weight:800;}
.stat .b{font-size:11px;color:var(--muted);}

.board-wrap{position:relative;}
.board{width:100%;aspect-ratio:1;background:var(--line-strong);border:2.5px solid var(--line-strong);
  border-radius:10px;overflow:hidden;display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);
  gap:1px;touch-action:manipulation;}
.cell{background:var(--cell);display:flex;align-items:center;justify-content:center;position:relative;
  font-size:min(6.4vw,34px);font-weight:600;color:var(--user);cursor:pointer;}
.cell.fixed{background:var(--cell-fixed);color:var(--given);font-weight:700;}
.cell.peer{background:var(--peer);}
.cell.fixed.peer{background:var(--cell-fixed);filter:brightness(.97);}
.cell.same{background:var(--same);}
.cell.sel{background:var(--sel);}
.cell.wrong{color:var(--wrong)!important;}
.cell.hintv{color:var(--hint)!important;}
.cell.flash{animation:flash .5s;}
@keyframes flash{0%,100%{background:var(--cell)}50%{background:#fca5a5}}
/* thick 3x3 borders via box-shadow inset on grid using nth positions */
.cell[data-r="2"],.cell[data-r="5"]{box-shadow:inset 0 -2px 0 var(--line-strong);}
.cell[data-c="2"],.cell[data-c="5"]{box-shadow:inset -2px 0 0 var(--line-strong);}
.cell[data-r="2"][data-c="2"],.cell[data-r="2"][data-c="5"],
.cell[data-r="5"][data-c="2"],.cell[data-r="5"][data-c="5"]{box-shadow:inset -2px -2px 0 var(--line-strong);}
.notes{position:absolute;inset:2px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  pointer-events:none;}
.notes span{font-size:min(2.3vw,12px);color:var(--muted);display:flex;align-items:center;justify-content:center;line-height:1;}

.pad{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-top:16px;}
.num{position:relative;aspect-ratio:.72;border:0;border-radius:11px;background:var(--pad);color:var(--pad-ink);
  font-size:min(6vw,26px);font-weight:700;font-family:inherit;cursor:pointer;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;}
.num .rem{position:absolute;bottom:3px;font-size:9px;font-weight:600;color:var(--muted);}
.num.done{opacity:.35;}
.num:active{transform:scale(.94);}

.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
.tool{border:0;border-radius:12px;background:var(--panel);color:var(--ink);padding:11px 4px;
  font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;gap:3px;}
.tool .ic{font-size:19px;}
.tool.on{background:var(--accent);color:#fff;}
.tool .badge{position:absolute;}
.tool[disabled]{opacity:.4;}

/* ---------- Win / modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(10,12,20,.55);display:none;align-items:center;justify-content:center;
  padding:24px;z-index:20;backdrop-filter:blur(2px);}
.overlay.show{display:flex;}
.card{background:var(--panel);border-radius:20px;padding:26px 22px;max-width:340px;width:100%;
  text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.card .emoji{font-size:52px;}
.card h2{margin:8px 0 4px;font-size:22px;}
.card .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
.wstats{display:flex;justify-content:center;gap:22px;margin-bottom:20px;}
.wstats div .v{font-size:20px;font-weight:800;}
.wstats div .k{font-size:11px;color:var(--muted);}
.card .row{display:flex;gap:10px;}
.btn-ghost{flex:1;border:0;border-radius:12px;background:var(--pad);color:var(--ink);padding:13px;
  font-weight:700;font-family:inherit;font-size:14px;cursor:pointer;}
.btn-fill{flex:1;border:0;border-radius:12px;background:var(--accent);color:#fff;padding:13px;
  font-weight:700;font-family:inherit;font-size:14px;cursor:pointer;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 2px;border-bottom:1px solid var(--line);}
.settings-row:last-of-type{border-bottom:0;}
.settings-row .lbl{font-size:14px;font-weight:600;text-align:left;}
.settings-row .desc{font-size:11px;color:var(--muted);margin-top:2px;text-align:left;}
.switch{width:46px;height:28px;border-radius:14px;background:var(--line);position:relative;cursor:pointer;flex:none;transition:.15s;}
.switch.on{background:var(--ok);}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch.on::after{left:21px;}
.loading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:var(--bg);border-radius:10px;color:var(--muted);font-size:14px;z-index:5;flex-direction:column;gap:10px;}
.loading.show{display:flex;}
.spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 0.7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.link{background:none;border:0;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;text-decoration:underline;}
</style>

<div class="app">

    <div class="brand">

</div>

<!-- WIN -->

    <div class="emoji">🎉</div>

</div>

<!-- SETTINGS -->
<div class="overlay" id="settingsOverlay">
  <div class="card" style="text-align:left">
    <h2 style="text-align:center;margin-bottom:2px">設定</h2>
    <div class="sub" style="text-align:center">小數獨 v1</div>
    <div class="settings-row">
      <div><div class="lbl">立即提示錯誤</div><div class="desc">填錯數字時馬上標紅，適合小小孩</div></div>
      <div class="switch" id="swErr"></div>
    </div>
    <div class="settings-row">
      <div><div class="lbl">自動清筆記</div><div class="desc">填數字後自動移除同行列宮的筆記</div></div>

    </div>

      玩法：點一格 → 點下面的數字填入。開「筆記」可在格子裡記候選數。💡提示會幫你填一格正解。

      <button class="btn-ghost" id="resetProgress">重設進度</button>
      <button class="btn-fill" id="closeSettings">完成</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============ 資料 ============ */
const DIFFS=[
  {key:'easy',   name:'簡單', clues:45, sub:'給空多、好上手', color:'#22c55e'},
  {key:'medium', name:'中等', clues:36, sub:'需要一點推理',   color:'#3b82f6'},
  {key:'hard',   name:'困難', clues:30, sub:'要動點腦',       color:'#f59e0b'},
  {key:'expert', name:'專家', clues:25, sub:'高手挑戰',       color:'#ef4444'},
];
const LEVELS_BATCH=30;           // 一次顯示幾關（按「更多」再加）
const LS={prog:'sudoku.progress.v1', cur:'sudoku.current.v1', set:'sudoku.settings.v1', ip:'sudoku.inprogress.v1'};

/* ============ 亂數（可重現，關卡靠 seed 固定） ============ */
function mulberry32(seed){let a=seed>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shuffle(arr,rng){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function levelSeed(di,lv){let h=(2166136261^di)>>>0;h=Math.imul(h^lv,16777619);h=Math.imul(h^(lv>>>8),16777619);h=Math.imul(h^(lv>>>16),16777619);return h>>>0;}

/* ============ 數獨引擎 ============ */
function valid(b,pos,n){
  const r=(pos/9)|0,c=pos%9;
  for(let i=0;i<9;i++){if(b[r*9+i]===n)return false;if(b[i*9+c]===n)return false;}
  const br=(r/3|0)*3,bc=(c/3|0)*3;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++)if(b[(br+i)*9+(bc+j)]===n)return false;
  return true;
}
function solveFull(b,rng){
  const pos=b.indexOf(0);
  if(pos===-1)return true;
  const nums=shuffle([1,2,3,4,5,6,7,8,9],rng);
  for(const n of nums){if(valid(b,pos,n)){b[pos]=n;if(solveFull(b,rng))return true;b[pos]=0;}}
  return false;
}
// 用 MRV（最少候選格優先）數解，最多數到 limit
function countSolutions(b,limit){
  let best=-1,bestC=null;
  for(let p=0;p<81;p++){
    if(b[p]!==0)continue;
    const cand=[];
    for(let n=1;n<=9;n++)if(valid(b,p,n))cand.push(n);
    if(cand.length===0)return 0;
    if(cand.length===1){b[p]=cand[0];const r=countSolutions(b,limit);b[p]=0;return r;}
    if(best===-1||cand.length<bestC.length){best=p;bestC=cand;}
  }
  if(best===-1)return 1; // 全填滿
  let count=0;
  for(const n of bestC){b[best]=n;count+=countSolutions(b,limit);b[best]=0;if(count>=limit)break;}
  return count;
}
function generate(di,seedNum){
  const rng=mulberry32(seedNum);
  const solution=new Array(81).fill(0);
  solveFull(solution,rng);
  const puzzle=solution.slice();
  const target=DIFFS[di].clues;
  const order=shuffle([...Array(81).keys()],rng);
  let clues=81;
  for(const pos of order){
    if(clues<=target)break;
    const bak=puzzle[pos];
    if(bak===0)continue;
    puzzle[pos]=0;
    const test=puzzle.slice();
    if(countSolutions(test,2)!==1){puzzle[pos]=bak;}else{clues--;}
  }
  return {puzzle,solution};
}

/* ============ 狀態 ============ */
let S=null; // 目前遊戲
let curDiff=0, curTab='levels', shownLevels=LEVELS_BATCH;
let timerId=null;
let settings={showErr:true,autoNote:true,limitMist:false};
let progress={}; // {di:{lv:{time,mist}}}
let inProgress={}; // {"di:lv":存檔快照} —— 每一關各自的「玩到一半」進度

/* ============ 儲存 ============ */
function loadStore(){
  try{progress=JSON.parse(localStorage.getItem(LS.prog))||{};}catch(e){progress={};}
  try{inProgress=JSON.parse(localStorage.getItem(LS.ip))||{};}catch(e){inProgress={};}
  try{const s=JSON.parse(localStorage.getItem(LS.set));if(s)settings={...settings,...s};}catch(e){}
}
function saveProgress(){localStorage.setItem(LS.prog,JSON.stringify(progress));}
function saveSettings(){localStorage.setItem(LS.set,JSON.stringify(settings));}
function persistIP(){localStorage.setItem(LS.ip,JSON.stringify(inProgress));}
function lvKey(di,lv){return di+':'+lv;}
function snapshot(){
  return {di:S.di,level:S.level,mode:S.mode,seed:S.seed,
    puzzle:S.puzzle,solution:S.solution,values:S.values,notes:S.notes,
    mist:S.mist,hints:S.hints,elapsed:S.elapsed,ts:Date.now()};
}
// 有沒有真的動過（避免只是打開沒填就被記成「續」）
function hasProgress(){
  if(!S)return false;
  for(let i=0;i<81;i++)if(S.puzzle[i]===0&&S.values[i]!==0)return true;
  for(let i=0;i<81;i++)if(S.notes[i]&&S.notes[i].length)return true;
  return S.hints>0||S.mist>0;
}
// 存進度：全域「繼續上次」槽 +（闖關模式）該關專屬槽
function saveCurrent(){
  if(!S||S.done)return;
  if(!hasProgress()){clearSaved();return;} // 沒動過就不留存檔
  const snap=snapshot();
  localStorage.setItem(LS.cur,JSON.stringify(snap));
  if(S.mode==='levels'){inProgress[lvKey(S.di,S.level)]=snap;persistIP();}
}
// 清掉這一局的存檔（過關 / 主動重來時呼叫）
function clearSaved(){
  localStorage.removeItem(LS.cur);
  if(S&&S.mode==='levels'){delete inProgress[lvKey(S.di,S.level)];persistIP();}
}
function getSaved(){try{return JSON.parse(localStorage.getItem(LS.cur));}catch(e){return null;}}

/* ============ 畫面切換 ============ */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));}

/* ============ Home 渲染 ============ */
function renderDiffs(){
  const el=document.getElementById('diffs');el.innerHTML='';
  DIFFS.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='diff'+(i===curDiff?' sel':'');
    b.innerHTML=`<div class="n"><span class="d" style="background:${d.color}"></span>${d.name}</div><div class="p">${d.sub}</div>`;
    b.onclick=()=>{curDiff=i;renderDiffs();renderLevels();};
    el.appendChild(b);
  });
}
function fmt(t){const s=Math.floor(t/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function renderLevels(){
  const el=document.getElementById('levels');el.innerHTML='';
  const p=progress[curDiff]||{};
  for(let lv=1;lv<=shownLevels;lv++){
    const done=p[lv];
    const ip=inProgress[lvKey(curDiff,lv)];
    const b=document.createElement('button');
    let cls='lv',inner=`${lv}`;
    if(ip){cls+=' inprog';inner=`${lv}<span class="chk">▶</span><span class="tm">續 ${fmt(ip.elapsed)}</span>`;}
    else if(done){cls+=' done';inner=`${lv}<span class="chk">✓</span><span class="tm">${fmt(done.time)}</span>`;}
    b.className=cls;
    b.innerHTML=inner;
    b.onclick=()=>startGame(curDiff,lv,'levels');
    el.appendChild(b);
  }
  const more=document.createElement('button');
  more.className='more';more.textContent='顯示更多關卡 +';
  more.onclick=()=>{shownLevels+=LEVELS_BATCH;renderLevels();};
  el.appendChild(more);
}
function renderContinue(){
  const sv=getSaved();const btn=document.getElementById('continueBtn');
  if(sv){
    const dn=DIFFS[sv.di].name;
    const where=sv.mode==='infinite'?'無限練習':`第 ${sv.level} 關`;
    document.getElementById('continueSub').textContent=`${dn}・${where}・已用 ${fmt(sv.elapsed)}`;
    btn.style.display='block';
  }else btn.style.display='none';
}

/* ============ 遊戲流程 ============ */
// forceNew=true 代表「重來」，忽略存檔重新生成
function startGame(di,level,mode,seedOverride,forceNew){
  show('game');
  // 闖關模式：若這一關有玩到一半的存檔，直接接續（除非按了重來）
  if(mode==='levels'&&!forceNew){
    const snap=inProgress[lvKey(di,level)];
    if(snap){resumeGame(snap);return;}
  }
  document.getElementById('loading').classList.add('show');
  document.getElementById('board').innerHTML='';
  // 延一格讓 loading 先畫出來，再做（可能較重）運算
  setTimeout(()=>{
    const seed=mode==='infinite'?(seedOverride>>>0):levelSeed(di,level);
    const {puzzle,solution}=generate(di,seed);
    S={di,level,mode,seed,puzzle,solution,
       values:puzzle.slice(),notes:Array.from({length:81},()=>[]),
       sel:-1,mist:0,hints:0,elapsed:0,notesMode:false,done:false,history:[]};
    document.getElementById('loading').classList.remove('show');
    buildBoard();buildPad();refreshHeader();startTimer();updateTools();saveCurrent();
  },30);
}
// 重來這一局：清掉存檔，重新生成同一關
function restartGame(){
  if(!S)return;
  if(!confirm('重來這一關？目前的進度會清掉。'))return;
  const {di,level,mode,seed}=S;
  clearInterval(timerId);
  if(mode==='levels'){delete inProgress[lvKey(di,level)];persistIP();startGame(di,level,'levels',null,true);}
  else startGame(curDiff,0,'infinite',(Date.now()^Math.floor(Math.random()*1e9))>>>0);
}
function resumeGame(sv){
  show('game');
  S={di:sv.di,level:sv.level,mode:sv.mode,seed:sv.seed,puzzle:sv.puzzle,solution:sv.solution,
     values:sv.values,notes:sv.notes,sel:-1,mist:sv.mist,hints:sv.hints,elapsed:sv.elapsed,
     notesMode:false,done:false,history:[]};
  buildBoard();buildPad();refreshHeader();startTimer();updateTools();
}
function refreshHeader(){
  document.getElementById('gTitle').textContent=DIFFS[S.di].name;
  document.getElementById('gSub').textContent=S.mode==='infinite'?'無限練習':`第 ${S.level} 關`;
  document.getElementById('gMist').textContent='錯誤 '+S.mist+(settings.limitMist?' / 3':'');
}
function startTimer(){
  clearInterval(timerId);
  document.getElementById('gTimer').textContent=fmt(S.elapsed);
  timerId=setInterval(()=>{
    if(document.hidden||S.done)return;
    S.elapsed+=1000;document.getElementById('gTimer').textContent=fmt(S.elapsed);
    if(S.elapsed%5000===0)saveCurrent();
  },1000);
}

/* ---- 棋盤 ---- */
function buildBoard(){
  const board=document.getElementById('board');board.innerHTML='';
  for(let i=0;i<81;i++){
    const c=document.createElement('div');
    c.className='cell';c.dataset.i=i;c.dataset.r=(i/9)|0;c.dataset.c=i%9;
    c.onclick=()=>selectCell(i);
    board.appendChild(c);
  }
  renderCells();
}
function renderCells(){
  const cells=document.getElementById('board').children;
  const selVal=S.sel>=0?S.values[S.sel]:0;
  const selR=S.sel>=0?(S.sel/9|0):-1, selC=S.sel>=0?S.sel%9:-1;
  const selB=S.sel>=0?((selR/3|0)*3+(selC/3|0)):-1;
  for(let i=0;i<81;i++){
    const cell=cells[i];const v=S.values[i];const fixed=S.puzzle[i]!==0;
    const r=(i/9|0),c=i%9,b=((r/3|0)*3+(c/3|0));
    let cls='cell';
    if(fixed)cls+=' fixed';
    if(S.hintCells&&S.hintCells.has(i))cls+=' hintv';
    if(S.sel>=0&&i!==S.sel&&(r===selR||c===selC||b===selB))cls+=' peer';
    if(selVal&&v===selVal&&i!==S.sel)cls+=' same';
    if(i===S.sel)cls+=' sel';
    if(settings.showErr&&v!==0&&!fixed&&v!==S.solution[i])cls+=' wrong';
    cell.className=cls;
    if(v!==0){cell.textContent=v;}
    else{
      cell.textContent='';
      if(S.notes[i]&&S.notes[i].length){
        const nb=document.createElement('div');nb.className='notes';
        for(let n=1;n<=9;n++){const s=document.createElement('span');s.textContent=S.notes[i].includes(n)?n:'';nb.appendChild(s);}
        cell.appendChild(nb);
      }
    }
  }
}
function selectCell(i){S.sel=i;renderCells();}

/* ---- 數字盤 ---- */
function buildPad(){
  const pad=document.getElementById('pad');pad.innerHTML='';
  for(let n=1;n<=9;n++){
    const b=document.createElement('button');
    b.className='num';b.dataset.n=n;
    b.innerHTML=`${n}<span class="rem"></span>`;
    b.onclick=()=>inputNumber(n);
    pad.appendChild(b);
  }
  updatePad();
}
function updatePad(){
  const counts=new Array(10).fill(0);
  for(let i=0;i<81;i++)if(S.values[i])counts[S.values[i]]++;
  const pad=document.getElementById('pad').children;
  for(let n=1;n<=9;n++){
    pad[n-1].querySelector('.rem').textContent=Math.max(0,9-counts[n])||'';
    pad[n-1].classList.toggle('done',counts[n]>=9);
  }
}

/* ---- 輸入 ---- */
function pushHistory(){
  S.history.push({values:S.values.slice(),notes:S.notes.map(a=>a.slice()),
    hintCells:S.hintCells?[...S.hintCells]:[],mist:S.mist});
  if(S.history.length>250)S.history.shift();
}
function inputNumber(n){
  if(S.done||S.sel<0)return;
  const i=S.sel;
  if(S.puzzle[i]!==0)return; // 題目給定不可改
  if(S.notesMode){
    pushHistory();
    if(S.values[i]!==0)S.values[i]=0;
    const arr=S.notes[i];const k=arr.indexOf(n);
    if(k>=0)arr.splice(k,1);else arr.push(n);
    renderCells();saveCurrent();updateTools();return;
  }
  pushHistory();
  if(S.values[i]===n){S.values[i]=0;} // 再按一次取消
  else{
    S.values[i]=n;S.notes[i]=[];
    if(S.hintCells)S.hintCells.delete(i);
    if(n!==S.solution[i]){
      S.mist++;refreshHeader();
      if(settings.limitMist&&S.mist>=3){renderCells();updatePad();updateTools();gameOver();return;}
    }else if(settings.autoNote){
      const r=(i/9|0),c=i%9,br=(r/3|0)*3,bc=(c/3|0)*3;
      for(let k=0;k<9;k++){removeNote(r*9+k,n);removeNote(k*9+c,n);}
      for(let a=0;a<3;a++)for(let b=0;b<3;b++)removeNote((br+a)*9+(bc+b),n);
    }
  }
  renderCells();updatePad();updateTools();saveCurrent();checkWin();
}
function removeNote(idx,n){const arr=S.notes[idx];if(!arr)return;const k=arr.indexOf(n);if(k>=0)arr.splice(k,1);}
function eraseCell(){
  if(S.done||S.sel<0)return;const i=S.sel;if(S.puzzle[i]!==0)return;
  if(S.values[i]===0&&(!S.notes[i]||!S.notes[i].length))return;
  pushHistory();S.values[i]=0;S.notes[i]=[];if(S.hintCells)S.hintCells.delete(i);
  renderCells();updatePad();updateTools();saveCurrent();
}
function undo(){
  if(S.done||!S.history.length)return;
  const h=S.history.pop();
  S.values=h.values;S.notes=h.notes;S.mist=h.mist;S.hintCells=new Set(h.hintCells);
  refreshHeader();renderCells();updatePad();updateTools();saveCurrent();
}
function toggleNotes(){S.notesMode=!S.notesMode;updateTools();}
function hint(){
  if(S.done)return;
  let i=S.sel;
  if(i<0||S.values[i]!==0||S.puzzle[i]!==0){
    const empties=[];for(let k=0;k<81;k++)if(S.values[k]===0)empties.push(k);
    if(!empties.length)return;i=empties[Math.floor(Math.random()*empties.length)];S.sel=i;
  }
  if(S.values[i]!==0&&S.values[i]===S.solution[i])return;
  pushHistory();
  S.values[i]=S.solution[i];S.notes[i]=[];
  if(!S.hintCells)S.hintCells=new Set();S.hintCells.add(i);
  S.hints++;
  renderCells();updatePad();updateTools();saveCurrent();checkWin();
}
function updateTools(){
  document.getElementById('notesBtn').classList.toggle('on',S.notesMode);
  document.getElementById('notesLabel').textContent='筆記 '+(S.notesMode?'開':'關');
  document.getElementById('undoBtn').disabled=!S.history.length;
}

/* ---- 勝負 ---- */
function checkWin(){
  for(let i=0;i<81;i++)if(S.values[i]!==S.solution[i])return;
  S.done=true;clearInterval(timerId);
  // 記錄闖關成績
  if(S.mode==='levels'){
    if(!progress[S.di])progress[S.di]={};
    const prev=progress[S.di][S.level];
    if(!prev||S.elapsed<prev.time)progress[S.di][S.level]={time:S.elapsed,mist:S.mist};
    saveProgress();
  }
  clearSaved();
  document.getElementById('winTime').textContent=fmt(S.elapsed);
  document.getElementById('winMist').textContent=S.mist;
  document.getElementById('winHint').textContent=S.hints;
  document.getElementById('winTitle').textContent=S.hints===0&&S.mist===0?'完美通關！':'完成！';
  document.getElementById('winSub').textContent=S.mode==='infinite'?'又練了一題':`${DIFFS[S.di].name}・第 ${S.level} 關`;
  document.getElementById('winNext').textContent=S.mode==='infinite'?'再來一題 →':'下一關 →';
  document.getElementById('winOverlay').classList.add('show');
}
function gameOver(){
  clearSaved();S.done=true;clearInterval(timerId);
  document.getElementById('winTitle').textContent='錯太多次了';
  document.getElementById('winSub').textContent='再試一次就好，別氣餒！';
  document.querySelector('#winOverlay .emoji').textContent='😅';
  document.getElementById('winTime').textContent=fmt(S.elapsed);
  document.getElementById('winMist').textContent=S.mist;
  document.getElementById('winHint').textContent=S.hints;
  document.getElementById('winNext').textContent='重玩本關';
  document.getElementById('winNext').dataset.retry='1';
  document.getElementById('winOverlay').classList.add('show');
}

/* ============ 事件綁定 ============ */
function bind(){
  document.getElementById('backBtn').onclick=()=>{saveCurrent();clearInterval(timerId);goHome();};
  document.getElementById('restartBtn').onclick=restartGame;
  document.getElementById('undoBtn').onclick=undo;
  document.getElementById('eraseBtn').onclick=eraseCell;
  document.getElementById('notesBtn').onclick=toggleNotes;
  document.getElementById('hintBtn').onclick=hint;
  document.getElementById('continueBtn').onclick=()=>{const sv=getSaved();if(sv)resumeGame(sv);};
  document.getElementById('infiniteStart').onclick=()=>startGame(curDiff,0,'infinite',(Date.now()^Math.floor(Math.random()*1e9))>>>0);
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    curTab=t.dataset.mode;
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('sel',x===t));
    document.getElementById('levelsView').style.display=curTab==='levels'?'block':'none';
    document.getElementById('infiniteView').style.display=curTab==='infinite'?'block':'none';
  });
  // win
  document.getElementById('winHome').onclick=()=>{document.getElementById('winOverlay').classList.remove('show');resetWinCard();goHome();};
  document.getElementById('winNext').onclick=()=>{
    const ov=document.getElementById('winOverlay');ov.classList.remove('show');
    const retry=document.getElementById('winNext').dataset.retry;resetWinCard();
    if(retry)startGame(S.di,S.level,S.mode,S.seed);
    else if(S.mode==='infinite')startGame(curDiff,0,'infinite',(Date.now()^Math.floor(Math.random()*1e9))>>>0);
    else startGame(S.di,S.level+1,'levels');
  };
  // settings
  document.getElementById('openSettings').onclick=()=>{syncSwitches();document.getElementById('settingsOverlay').classList.add('show');};
  document.getElementById('closeSettings').onclick=()=>document.getElementById('settingsOverlay').classList.remove('show');
  const sw=(id,key)=>{document.getElementById(id).onclick=()=>{settings[key]=!settings[key];saveSettings();syncSwitches();if(S&&!S.done)renderCells(),refreshHeader();};};
  sw('swErr','showErr');sw('swAuto','autoNote');sw('swLimit','limitMist');
  document.getElementById('resetProgress').onclick=()=>{
    if(confirm('確定要清除所有闖關進度與紀錄嗎？')){progress={};inProgress={};saveProgress();persistIP();localStorage.removeItem(LS.cur);renderLevels();renderContinue();}
  };
  // 鍵盤（iPad 外接鍵盤 / 桌機測試）
  document.addEventListener('keydown',e=>{
    if(document.getElementById('game').classList.contains('active')&&S&&!S.done){
      if(e.key>='1'&&e.key<='9')inputNumber(+e.key);
      else if(e.key==='Backspace'||e.key==='0'||e.key==='Delete')eraseCell();
      else if(e.key==='n'||e.key==='N')toggleNotes();
      else if(e.key==='h'||e.key==='H')hint();
      else if(e.key.startsWith('Arrow')&&S.sel>=0){
        let r=(S.sel/9|0),c=S.sel%9;
        if(e.key==='ArrowUp')r=(r+8)%9;if(e.key==='ArrowDown')r=(r+1)%9;
        if(e.key==='ArrowLeft')c=(c+8)%9;if(e.key==='ArrowRight')c=(c+1)%9;
        selectCell(r*9+c);e.preventDefault();
      }
    }
  });
  document.addEventListener('visibilitychange',()=>{if(document.hidden)saveCurrent();});
  window.addEventListener('pagehide',saveCurrent);
}
function resetWinCard(){
  document.querySelector('#winOverlay .emoji').textContent='🎉';
  delete document.getElementById('winNext').dataset.retry;
}
function syncSwitches(){
  document.getElementById('swErr').classList.toggle('on',settings.showErr);
  document.getElementById('swAuto').classList.toggle('on',settings.autoNote);
  document.getElementById('swLimit').classList.toggle('on',settings.limitMist);
}
function goHome(){show('home');renderLevels();renderContinue();}

/* ============ 啟動 ============ */
loadStore();bind();renderDiffs();renderLevels();renderContinue();
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
