<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小數獨">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>小數獨</title>
<style>
:root{
  --bg:#f4f5fb; --panel:#ffffff; --ink:#1f2430; --muted:#8a90a2;
  --line:#d7dae6; --line-strong:#3a4054; --cell:#ffffff; --cell-fixed:#eef0f8;
  --sel:#c7d2fe; --peer:#e8ecfb; --same:#bfdbfe; --accent:#4f46e5;
  --given:#1f2430; --user:#2563eb; --wrong:#dc2626; --hint:#059669;
  --pad:#eef0f8; --pad-ink:#2b3040; --shadow:0 1px 3px rgba(20,24,40,.12);
  --ok:#22c55e;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#12141c; --panel:#1b1e29; --ink:#e8eaf2; --muted:#8a90a2;
    --line:#2c3040; --line-strong:#5b627a; --cell:#1b1e29; --cell-fixed:#232838;
    --sel:#3b3f74; --peer:#242942; --same:#274156; --accent:#818cf8;
    --given:#e8eaf2; --user:#60a5fa; --wrong:#f87171; --hint:#34d399;
    --pad:#232838; --pad-ink:#cdd2e4; --shadow:0 1px 3px rgba(0,0,0,.4);
    --ok:#4ade80;
  }
}
:root[data-theme="light"]{ color-scheme:light; }
:root[data-theme="dark"]{ color-scheme:dark; }
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Segoe UI",Roboto,sans-serif;
  overscroll-behavior:none; -webkit-user-select:none; user-select:none;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
.screen{display:none;flex:1;flex-direction:column;padding:14px 16px 20px;}
.screen.active{display:flex;}

/* ---------- Home ---------- */
.brand{display:flex;align-items:center;gap:10px;margin:8px 2px 18px;}
.brand .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#6366f1,#a855f7);
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px;box-shadow:var(--shadow);}
.brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:.5px;}
.brand small{display:block;color:var(--muted);font-weight:500;font-size:12px;margin-top:1px;}

.continue{width:100%;border:0;border-radius:16px;padding:16px;margin-bottom:18px;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;text-align:left;
  box-shadow:0 6px 18px rgba(79,70,229,.32);cursor:pointer;font-family:inherit;}
.continue .t{font-size:16px;font-weight:700;}
.continue .s{font-size:13px;opacity:.9;margin-top:3px;}

.section-title{font-size:13px;font-weight:700;color:var(--muted);margin:6px 2px 10px;letter-spacing:.4px;}

.diffs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:16px;}
.diff{border:2px solid transparent;background:var(--panel);border-radius:13px;padding:11px 6px 10px;
  text-align:center;cursor:pointer;font-family:inherit;box-shadow:var(--shadow);transition:.12s;}
.diff .d{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}
.diff .n{font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap;}
.diff .p{font-size:10.5px;color:var(--muted);margin-top:4px;line-height:1.25;}
.diff.sel{border-color:var(--accent);}

.tabs{display:flex;gap:8px;background:var(--panel);padding:4px;border-radius:12px;margin-bottom:14px;box-shadow:var(--shadow);}
.tab{flex:1;border:0;background:transparent;padding:9px;border-radius:9px;font-family:inherit;
  font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;}
.tab.sel{background:var(--accent);color:#fff;}

.infinite-box{background:var(--panel);border-radius:16px;padding:22px 18px;text-align:center;box-shadow:var(--shadow);}
.infinite-box p{color:var(--muted);font-size:13px;margin:0 0 16px;line-height:1.5;}
.btn-primary{border:0;border-radius:12px;background:var(--accent);color:#fff;padding:14px 22px;
  font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 12px rgba(79,70,229,.28);}

.levels{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;}
.lv{position:relative;aspect-ratio:1;border:0;border-radius:12px;background:var(--panel);
  color:var(--ink);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;justify-content:center;}
.lv.done{background:var(--accent);color:#fff;}
.lv.inprog{background:#fff7ed;color:#9a3412;box-shadow:inset 0 0 0 2px #f59e0b,var(--shadow);}
@media (prefers-color-scheme:dark){.lv.inprog{background:#3a2a12;color:#fbbf24;}}
:root[data-theme="dark"] .lv.inprog{background:#3a2a12;color:#fbbf24;}
:root[data-theme="light"] .lv.inprog{background:#fff7ed;color:#9a3412;}
.lv .tm{font-size:9px;font-weight:600;opacity:.85;margin-top:2px;}
.lv .chk{position:absolute;top:4px;right:6px;font-size:10px;}
.more{grid-column:1/-1;border:0;background:transparent;color:var(--accent);font-weight:700;
  font-family:inherit;font-size:14px;padding:12px;cursor:pointer;}

/* ---------- Game ---------- */
.gbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.iconbtn{border:0;background:var(--panel);width:38px;height:38px;border-radius:11px;font-size:18px;
  cursor:pointer;box-shadow:var(--shadow);color:var(--ink);display:grid;place-items:center;}
.gtitle{flex:1;}
.gtitle .a{font-size:15px;font-weight:800;}
.gtitle .b{font-size:12px;color:var(--muted);}
.stat{text-align:right;font-variant-numeric:tabular-nums;}
.stat .a{font-size:16px;font-weight:800;}
.stat .b{font-size:11px;color:var(--muted);}

.board-wrap{position:relative;}
.board{width:100%;aspect-ratio:1;background:var(--line-strong);border:2.5px solid var(--line-strong);
  border-radius:10px;overflow:hidden;display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);
  gap:1px;touch-action:manipulation;}
.cell{background:var(--cell);display:flex;align-items:center;justify-content:center;position:relative;
  font-size:var(--cf,min(6.4vw,34px));font-weight:600;color:var(--user);cursor:pointer;}
.cell.fixed{background:var(--cell-fixed);color:var(--given);font-weight:700;}
.cell.peer{background:var(--peer);}
.cell.fixed.peer{background:var(--cell-fixed);filter:brightness(.97);}
.cell.same{background:var(--same);}
.cell.sel{background:var(--sel);}
.cell.wrong{color:var(--wrong)!important;}
.cell.hintv{color:var(--hint)!important;}
.cell.flash{animation:flash .5s;}
@keyframes flash{0%,100%{background:var(--cell)}50%{background:#fca5a5}}
.cell.coachhi{background:#fde68a;}
:root[data-theme="dark"] .cell.coachhi{background:#7a5c17;}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]) .cell.coachhi{background:#7a5c17;}}
.coach{margin-top:12px;background:var(--panel);border-radius:12px;padding:11px 13px;font-size:14px;line-height:1.55;color:var(--ink);box-shadow:var(--shadow);display:flex;gap:9px;align-items:flex-start;}
.coach .ic{font-size:17px;flex:none;line-height:1.4;}
.coach .tx{flex:1;}
.coach b{color:var(--accent);font-weight:700;}
.coach.warn{background:#fff7ed;color:#9a3412;}
.coach.warn b{color:#9a3412;}
:root[data-theme="dark"] .coach.warn{background:#3a2a12;color:#fbbf24;}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]) .coach.warn{background:#3a2a12;color:#fbbf24;}}
/* 宮的粗線改由 buildBoard 依 bh/bw 逐格算 inline box-shadow（沿用 --line-strong，支援任意尺寸） */
.notes{position:absolute;inset:2px;display:grid;grid-template-columns:repeat(3,1fr);
  pointer-events:none;}
.notes span{font-size:min(2.3vw,12px);color:var(--muted);display:flex;align-items:center;justify-content:center;line-height:1;}

.pad{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-top:16px;}
.num{position:relative;aspect-ratio:.72;border:0;border-radius:11px;background:var(--pad);color:var(--pad-ink);
  font-size:min(6vw,26px);font-weight:700;font-family:inherit;cursor:pointer;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;}
.num .rem{position:absolute;bottom:3px;font-size:9px;font-weight:600;color:var(--muted);}
.num.done{opacity:.35;}
.num:active{transform:scale(.94);}

.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
.tool{border:0;border-radius:12px;background:var(--panel);color:var(--ink);padding:11px 4px;
  font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;gap:3px;}
.tool .ic{font-size:19px;}
.tool.on{background:var(--accent);color:#fff;}
.tool .badge{position:absolute;}
.tool[disabled]{opacity:.4;}

/* ---------- Win / modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(10,12,20,.55);display:none;align-items:center;justify-content:center;
  padding:24px;z-index:20;backdrop-filter:blur(2px);}
.overlay.show{display:flex;}
.card{background:var(--panel);border-radius:20px;padding:26px 22px;max-width:340px;width:100%;
  text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.card .emoji{font-size:52px;}
.card h2{margin:8px 0 4px;font-size:22px;}
.card .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
.wstats{display:flex;justify-content:center;gap:22px;margin-bottom:20px;}
.wstats div .v{font-size:20px;font-weight:800;}
.wstats div .k{font-size:11px;color:var(--muted);}
.card .row{display:flex;gap:10px;}
.btn-ghost{flex:1;border:0;border-radius:12px;background:var(--pad);color:var(--ink);padding:13px;
  font-weight:700;font-family:inherit;font-size:14px;cursor:pointer;}
.btn-fill{flex:1;border:0;border-radius:12px;background:var(--accent);color:#fff;padding:13px;
  font-weight:700;font-family:inherit;font-size:14px;cursor:pointer;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 2px;border-bottom:1px solid var(--line);}
.settings-row:last-of-type{border-bottom:0;}
.settings-row .lbl{font-size:14px;font-weight:600;text-align:left;}
.settings-row .desc{font-size:11px;color:var(--muted);margin-top:2px;text-align:left;}
.switch{width:46px;height:28px;border-radius:14px;background:var(--line);position:relative;cursor:pointer;flex:none;transition:.15s;}
.switch.on{background:var(--ok);}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch.on::after{left:21px;}
.loading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:var(--bg);border-radius:10px;color:var(--muted);font-size:14px;z-index:5;flex-direction:column;gap:10px;}
.loading.show{display:flex;}
.spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 0.7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.link{background:none;border:0;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;text-decoration:underline;}
</style>

<div class="app">
  <!-- HOME -->
  <section id="home" class="screen active">
    <div class="brand">
      <div class="logo">數</div>
      <div><h1>小數獨<small>免費・無廣告・練習數字推理</small></h1></div>
    </div>

    <div class="section-title">選難度</div>
    <div class="diffs" id="diffs"></div>

    <div class="tabs">
      <button class="tab sel" data-mode="levels">闖關模式</button>
      <button class="tab" data-mode="infinite">無限模式</button>
    </div>

    <div id="levelsView">
      <div class="levels" id="levels"></div>
    </div>
    <div id="infiniteView" style="display:none">
      <div class="infinite-box">
        <p>隨機出一題全新的數獨，想練多少就練多少。<br>不計入闖關進度，純練習用。</p>
        <button class="btn-primary" id="infiniteStart">出一題新的 →</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:22px">
      <button class="link" id="openSettings">設定與說明</button>
    </div>
  </section>

  <!-- GAME -->
  <section id="game" class="screen">
    <div class="gbar">
      <button class="iconbtn" id="backBtn">‹</button>
      <div class="gtitle"><div class="a" id="gTitle">簡單</div><div class="b" id="gSub">第 1 關</div></div>
      <button class="iconbtn" id="restartBtn" title="重來這一關">↻</button>
      <div class="stat"><div class="a" id="gTimer">0:00</div><div class="b" id="gMist">錯誤 0</div></div>
    </div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="loading" id="loading"><div class="spin"></div><div>產生題目中…</div></div>
    </div>
    <div class="coach" id="coachBar" hidden></div>
    <div class="pad" id="pad"></div>
    <div class="tools">
      <button class="tool" id="undoBtn"><span class="ic">↩︎</span>撤銷</button>
      <button class="tool" id="eraseBtn"><span class="ic">⌫</span>擦除</button>
      <button class="tool" id="notesBtn"><span class="ic">✏️</span><span id="notesLabel">筆記 關</span></button>
      <button class="tool" id="hintBtn"><span class="ic">💡</span><span id="hintLabel">提示</span></button>
    </div>
  </section>
</div>

<!-- WIN -->
<div class="overlay" id="winOverlay">
  <div class="card">
    <div class="emoji">🎉</div>
    <h2 id="winTitle">完成！</h2>
    <div class="sub" id="winSub">你解開了這一題</div>
    <div class="wstats">
      <div><div class="v" id="winTime">0:00</div><div class="k">用時</div></div>
      <div><div class="v" id="winMist">0</div><div class="k">錯誤</div></div>
      <div><div class="v" id="winHint">0</div><div class="k">提示</div></div>
    </div>
    <div class="row">
      <button class="btn-ghost" id="winHome">回主畫面</button>
      <button class="btn-fill" id="winNext">下一題 →</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="overlay" id="settingsOverlay">
  <div class="card" style="text-align:left">
    <h2 style="text-align:center;margin-bottom:2px">設定</h2>
    <div class="sub" style="text-align:center">小數獨 v1</div>
    <div class="settings-row">
      <div><div class="lbl">立即提示錯誤</div><div class="desc">填錯數字時馬上標紅，適合小小孩</div></div>
      <div class="switch" id="swErr"></div>
    </div>
    <div class="settings-row">
      <div><div class="lbl">自動清筆記</div><div class="desc">填數字後自動移除同行列宮的筆記</div></div>
      <div class="switch" id="swAuto"></div>
    </div>
    <div class="settings-row">
      <div><div class="lbl">限制錯誤次數</div><div class="desc">錯 3 次就要重來（挑戰感）</div></div>
      <div class="switch" id="swLimit"></div>
    </div>
    <div style="font-size:12px;color:var(--muted);line-height:1.6;margin:14px 2px;text-align:left">
      玩法：點一格 → 點下面的數字填入。開「筆記」可在格子裡記候選數。💡提示會幫你填一格正解。
      每個數字填滿 9 個會自動變淡。全部填對就過關。
    </div>
    <div class="row" style="margin-top:6px">
      <button class="btn-ghost" id="resetProgress">重設進度</button>
      <button class="btn-fill" id="closeSettings">完成</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============ 資料 ============ */
// 連續階梯：尺寸(size)由小到大＋招式(tier)由淺到深。size=盤面邊長(4/6/9)；
// floor=挖到剩幾格提示就停；strict=要求「用低一級解不開」(只用在 9×9 中等以上，尺寸本身就是難度來源時不強制)。
const DIFFS=[
  {key:'tiny',   name:'幼幼', size:4, tier:1, floor:8,  strict:false, sub:'4×4 入門',   color:'#22c55e'},
  {key:'mini',   name:'入門', size:6, tier:2, floor:18, strict:false, sub:'6×6 過渡',   color:'#14b8a6'},
  {key:'easy',   name:'簡單', size:9, tier:1, floor:45, strict:false, sub:'找唯一空格', color:'#3b82f6'},
  {key:'medium', name:'中等', size:9, tier:2, floor:36, strict:true,  sub:'看一宮排除', color:'#8b5cf6'},
  {key:'hard',   name:'困難', size:9, tier:3, floor:30, strict:true,  sub:'掃整行整列', color:'#f59e0b'},
  {key:'expert', name:'專家', size:9, tier:4, floor:26, strict:true,  sub:'區塊排除',   color:'#ef4444'},
];
const LEVELS_BATCH=30;           // 一次顯示幾關（按「更多」再加）
const LS={prog:'sudoku.progress.v1', cur:'sudoku.current.v1', set:'sudoku.settings.v1', ip:'sudoku.inprogress.v1', last:'sudoku.lastplayed.v1'};

/* ============ 亂數（可重現，關卡靠 seed 固定） ============ */
function mulberry32(seed){let a=seed>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shuffle(arr,rng){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function levelSeed(di,lv){let h=(2166136261^di)>>>0;h=Math.imul(h^lv,16777619);h=Math.imul(h^(lv>>>8),16777619);h=Math.imul(h^(lv>>>16),16777619);return h>>>0;}

/* ============ 數獨引擎（泛化工廠：支援 4x4/6x6/9x9） ============ */
const _pc=m=>{let n=0;while(m){m&=m-1;n++;}return n;};
const _bit=n=>1<<(n-1);
const SIZES={4:[2,2],6:[2,3],9:[3,3]}; // 邊長→[宮高,宮寬]
function makeEngine(N,bh,bw){
  const CELLS=N*N, boxCols=N/bw, BOX0=2*N;
  const boxOf=p=>{const r=(p/N|0),c=p%N;return Math.floor(r/bh)*boxCols+Math.floor(c/bw);};
  const UNITS=[]; // 0..N-1 列, N..2N-1 行, 2N..3N-1 宮
  for(let r=0;r<N;r++){const a=[];for(let c=0;c<N;c++)a.push(r*N+c);UNITS.push(a);}
  for(let c=0;c<N;c++){const a=[];for(let r=0;r<N;r++)a.push(r*N+c);UNITS.push(a);}
  for(let br=0;br<N/bh;br++)for(let bc=0;bc<boxCols;bc++){const a=[];
    for(let i=0;i<bh;i++)for(let j=0;j<bw;j++)a.push((br*bh+i)*N+(bc*bw+j));UNITS.push(a);}
  const PEERS=[];
  for(let p=0;p<CELLS;p++){const s=new Set();const r=(p/N|0),c=p%N;
    for(let i=0;i<N;i++){s.add(r*N+i);s.add(i*N+c);}
    const br=Math.floor(r/bh)*bh,bc=Math.floor(c/bw)*bw;
    for(let i=0;i<bh;i++)for(let j=0;j<bw;j++)s.add((br+i)*N+(bc+j));
    s.delete(p);PEERS.push([...s]);}
  function valid(b,pos,n){const r=(pos/N|0),c=pos%N;
    for(let i=0;i<N;i++){if(b[r*N+i]===n)return false;if(b[i*N+c]===n)return false;}
    const br=Math.floor(r/bh)*bh,bc=Math.floor(c/bw)*bw;
    for(let i=0;i<bh;i++)for(let j=0;j<bw;j++)if(b[(br+i)*N+(bc+j)]===n)return false;return true;}
  function solveFull(b,rng){const p=b.indexOf(0);if(p===-1)return true;
    const ns=shuffle(Array.from({length:N},(_,i)=>i+1),rng);
    for(const n of ns){if(valid(b,p,n)){b[p]=n;if(solveFull(b,rng))return true;b[p]=0;}}return false;}
  function countSolutions(b,limit){let best=-1,bc2=null;for(let p=0;p<CELLS;p++){if(b[p]!==0)continue;const cd=[];
    for(let n=1;n<=N;n++)if(valid(b,p,n))cd.push(n);if(!cd.length)return 0;
    if(cd.length===1){b[p]=cd[0];const r=countSolutions(b,limit);b[p]=0;return r;}
    if(best===-1||cd.length<bc2.length){best=p;bc2=cd;}}if(best===-1)return 1;let cnt=0;
    for(const n of bc2){b[best]=n;cnt+=countSolutions(b,limit);b[best]=0;if(cnt>=limit)break;}return cnt;}
  function candsOf(val){const c=new Array(CELLS).fill(0);
    for(let p=0;p<CELLS;p++)if(val[p]===0){let m=0;for(let n=1;n<=N;n++)if(valid(val,p,n))m|=_bit(n);c[p]=m;}return c;}
  function findFill(val,cand,maxTier){
    for(let p=0;p<CELLS;p++)if(val[p]===0&&_pc(cand[p])===1)return{p,n:Math.log2(cand[p])+1,tier:1,unit:null};
    if(maxTier>=2)for(let bi=BOX0;bi<3*N;bi++){const u=UNITS[bi];for(let n=1;n<=N;n++){const b=_bit(n);let w=-1,c=0;
      for(const p of u)if(val[p]===0&&(cand[p]&b)){w=p;c++;}if(c===1)return{p:w,n,tier:2,unit:{kind:'宮',cells:u}};}}
    if(maxTier>=3)for(let ui=0;ui<2*N;ui++){const u=UNITS[ui];for(let n=1;n<=N;n++){const b=_bit(n);let w=-1,c=0;
      for(const p of u)if(val[p]===0&&(cand[p]&b)){w=p;c++;}if(c===1)return{p:w,n,tier:3,unit:{kind:ui<N?'列':'行',cells:u}};}}
    return null;}
  function doLocked(val,cand){let did=false;
    for(let bi=BOX0;bi<3*N;bi++){const box=UNITS[bi];for(let n=1;n<=N;n++){const b=_bit(n);
      const cs=box.filter(p=>val[p]===0&&(cand[p]&b));if(cs.length<2)continue;
      const rs=new Set(cs.map(p=>(p/N|0))),co=new Set(cs.map(p=>p%N));
      if(rs.size===1){const r=[...rs][0];for(let c=0;c<N;c++){const q=r*N+c;if(!box.includes(q)&&(cand[q]&b)){cand[q]&=~b;did=true;}}}
      if(co.size===1){const c=[...co][0];for(let r=0;r<N;r++){const q=r*N+c;if(!box.includes(q)&&(cand[q]&b)){cand[q]&=~b;did=true;}}}}}
    if(did)return true;
    for(let ui=0;ui<2*N;ui++){const u=UNITS[ui];for(let n=1;n<=N;n++){const b=_bit(n);
      const cs=u.filter(p=>val[p]===0&&(cand[p]&b));if(cs.length<2)continue;
      const bx=new Set(cs.map(boxOf));
      if(bx.size===1){const box=UNITS[BOX0+[...bx][0]];for(const q of box)if(!u.includes(q)&&val[q]===0&&(cand[q]&b)){cand[q]&=~b;did=true;}}}}
    return did;}
  function solveTier(puzzle,maxTier){const val=puzzle.slice();const cand=candsOf(val);
    const place=(p,n)=>{val[p]=n;cand[p]=0;for(const q of PEERS[p])cand[q]&=~_bit(n);};
    for(;;){const f=findFill(val,cand,maxTier>=3?3:maxTier);if(f){place(f.p,f.n);continue;}
      if(maxTier>=4&&doLocked(val,cand))continue;break;}
    return val.every(x=>x!==0);}
  function nextHint(board){const val=board.slice();const cand=candsOf(val);
    let f=findFill(val,cand,3);if(f)return{...f,needLocked:false};
    for(let g=0;g<40;g++){if(!doLocked(val,cand))break;f=findFill(val,cand,3);if(f)return{...f,needLocked:true};}
    return null;}
  function generate(tier,floor,seedNum,strict){let last=null;
    for(let attempt=0;attempt<80;attempt++){
      const seed=(seedNum^Math.imul(attempt+1,0x9E3779B1))>>>0;const rng=mulberry32(seed);
      const solution=new Array(CELLS).fill(0);solveFull(solution,rng);const puzzle=solution.slice();
      const order=shuffle([...Array(CELLS).keys()],rng);let clues=CELLS;
      for(const pos of order){if(clues<=floor)break;const bak=puzzle[pos];if(bak===0)continue;puzzle[pos]=0;
        const test=puzzle.slice();
        if(countSolutions(test,2)!==1||!solveTier(puzzle,tier)){puzzle[pos]=bak;}else{clues--;}}
      last={puzzle,solution};
      if(!strict||!solveTier(puzzle,tier-1))return {puzzle,solution};}
    return last;}
  return {N,bh,bw,generate,nextHint,solveTier};
}
const ENGINES={};
function engineFor(size){return ENGINES[size]||(ENGINES[size]=makeEngine(size,SIZES[size][0],SIZES[size][1]));}
// 對外包裝：依難度尺寸路由到對應引擎
function generate(di,seedNum){const d=DIFFS[di];return engineFor(d.size).generate(d.tier,d.floor,seedNum,d.strict);}
function nextHint(board){return engineFor(DIFFS[S.di].size).nextHint(board);}

/* ============ 狀態 ============ */
let S=null; // 目前遊戲
let curDiff=0, curTab='levels', shownByDiff={};
let timerId=null;
let settings={showErr:true,autoNote:true,limitMist:false};
let progress={}; // {di:{lv:{time,mist}}}
let inProgress={}; // {"di:lv":存檔快照} —— 每一關各自的「玩到一半」進度

/* ============ 儲存 ============ */
function loadStore(){
  try{progress=JSON.parse(localStorage.getItem(LS.prog))||{};}catch(e){progress={};}
  try{inProgress=JSON.parse(localStorage.getItem(LS.ip))||{};}catch(e){inProgress={};}
  try{const s=JSON.parse(localStorage.getItem(LS.set));if(s)settings={...settings,...s};}catch(e){}
}
function saveProgress(){localStorage.setItem(LS.prog,JSON.stringify(progress));}
function saveSettings(){localStorage.setItem(LS.set,JSON.stringify(settings));}
function persistIP(){localStorage.setItem(LS.ip,JSON.stringify(inProgress));}
function lvKey(di,lv){return di+':'+lv;}
function snapshot(){
  return {di:S.di,level:S.level,mode:S.mode,seed:S.seed,
    puzzle:S.puzzle,solution:S.solution,values:S.values,notes:S.notes,
    mist:S.mist,hints:S.hints,elapsed:S.elapsed,ts:Date.now()};
}
// 有沒有真的動過（避免只是打開沒填就被記成「續」）
function hasProgress(){
  if(!S)return false;
  for(let i=0;i<81;i++)if(S.puzzle[i]===0&&S.values[i]!==0)return true;
  for(let i=0;i<81;i++)if(S.notes[i]&&S.notes[i].length)return true;
  return S.hints>0||S.mist>0;
}
// 存進度：全域「繼續上次」槽 +（闖關模式）該關專屬槽
function saveCurrent(){
  if(!S||S.done)return;
  if(!hasProgress()){clearSaved();return;} // 沒動過就不留存檔
  const snap=snapshot();
  localStorage.setItem(LS.cur,JSON.stringify(snap));
  if(S.mode==='levels'){inProgress[lvKey(S.di,S.level)]=snap;persistIP();}
}
// 清掉這一局的存檔（過關 / 主動重來時呼叫）
function clearSaved(){
  localStorage.removeItem(LS.cur);
  if(S&&S.mode==='levels'){delete inProgress[lvKey(S.di,S.level)];persistIP();}
}
function getSaved(){try{return JSON.parse(localStorage.getItem(LS.cur));}catch(e){return null;}}
// 記「最後玩的那一關」（只記闖關模式）——供主畫面「接續上次」直達；即使破關後存檔清掉也留著
function markLastPlayed(di,level){try{localStorage.setItem(LS.last,JSON.stringify({di,level}));}catch(e){}}
function getLastPlayed(){try{const v=JSON.parse(localStorage.getItem(LS.last));if(v&&typeof v.di==='number'&&typeof v.level==='number')return v;}catch(e){}return null;}

/* ============ 畫面切換 ============ */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));}

/* ============ Home 渲染 ============ */
function renderDiffs(){
  const el=document.getElementById('diffs');el.innerHTML='';
  DIFFS.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='diff'+(i===curDiff?' sel':'');
    b.innerHTML=`<div class="n"><span class="d" style="background:${d.color}"></span>${d.name}</div><div class="p">${d.sub}</div>`;
    b.onclick=()=>{curDiff=i;renderDiffs();renderLevels(true);};
    el.appendChild(b);
  });
}
function fmt(t){const s=Math.floor(t/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
// 某難度玩家「走到最遠」的關卡（破關/玩到一半/最後遊玩皆算）——決定關卡列表要自動長到哪
function furthestLevel(di){
  let m=0;
  const p=progress[di]||{};
  for(const lv in p){const n=+lv;if(n>m)m=n;}
  for(const k in inProgress){const s=inProgress[k];if(s&&s.di===di&&s.mode!=='infinite'&&s.level>m)m=s.level;}
  const last=getLastPlayed();if(last&&last.di===di&&last.level>m)m=last.level;
  return m;
}
// 下一個要玩的關卡：最遠關還沒破（或有半局要續）→ 它本身；已破了 → 下一關
// （邊界：剛好破在 30 的整數倍且無半局時，下一關在下一批，列表要載到它）
function nextLevel(di){
  const f=furthestLevel(di);
  if(f===0)return 1;
  const done=progress[di]&&progress[di][f];
  if(!done||inProgress[lvKey(di,f)])return f;
  return f+1;
}
// 該難度目前要顯示幾關：至少一批，且自動長到能看見「下一個要玩的關」所在的整批；使用者手動「顯示更多」的展開量也保留
function shownForDiff(di){
  const t=nextLevel(di);
  const auto=Math.max(LEVELS_BATCH,Math.ceil(t/LEVELS_BATCH)*LEVELS_BATCH);
  const cur=shownByDiff[di]||0;
  const n=Math.max(cur,auto);
  shownByDiff[di]=n;
  return n;
}
// 主畫面「接續上次」要直達哪裡：①正在進行的那局（任何模式）②最後玩的那一關 ③（向後相容）最近的半局/最高破關關
function continueTarget(){
  const sv=getSaved();
  if(sv)return {kind:'resume',snap:sv,di:sv.di,level:sv.level,mode:sv.mode,elapsed:sv.elapsed};
  const last=getLastPlayed();
  if(last)return {kind:'level',di:last.di,level:last.level,mode:'levels'};
  let bestIP=null;
  for(const k in inProgress){const s=inProgress[k];if(!s||s.mode==='infinite')continue;if(!bestIP||(s.ts||0)>(bestIP.ts||0))bestIP=s;}
  if(bestIP)return {kind:'level',di:bestIP.di,level:bestIP.level,mode:'levels'};
  // 舊格式限制（非 bug）：progress.v1 沒有時間戳，只能取「關卡編號最高」當代理，
  // 不是真的「最近玩」——僅在升級後第一次、且無半局存檔時走到這裡，之後由 lastplayed 接手
  let best=null;
  for(const di in progress)for(const lv in progress[di]){const L=+lv,D=+di;if(!best||L>best.level)best={di:D,level:L};}
  if(best)return {kind:'level',di:best.di,level:best.level,mode:'levels'};
  return null;
}
function renderLevels(autoScroll){
  const el=document.getElementById('levels');el.innerHTML='';
  const p=progress[curDiff]||{};
  const shown=shownForDiff(curDiff);
  const target=nextLevel(curDiff);let targetBtn=null;
  for(let lv=1;lv<=shown;lv++){
    const done=p[lv];
    const ip=inProgress[lvKey(curDiff,lv)];
    const b=document.createElement('button');
    let cls='lv',inner=`${lv}`;
    if(ip){cls+=' inprog';inner=`${lv}<span class="chk">▶</span><span class="tm">續 ${fmt(ip.elapsed)}</span>`;}
    else if(done){cls+=' done';inner=`${lv}<span class="chk">✓</span><span class="tm">${fmt(done.time)}</span>`;}
    b.className=cls;
    b.innerHTML=inner;
    b.onclick=()=>startGame(curDiff,lv,'levels');
    if(lv===target)targetBtn=b;
    el.appendChild(b);
  }
  const more=document.createElement('button');
  more.className='more';more.textContent='顯示更多關卡 +';
  more.onclick=()=>{shownByDiff[curDiff]=shownForDiff(curDiff)+LEVELS_BATCH;renderLevels();};
  el.appendChild(more);
  // 進度在第一批之外時，捲到玩家目前進度所在的位置（使用者切難度時觸發，不在首頁初載硬捲）
  if(autoScroll&&targetBtn&&target>LEVELS_BATCH){
    requestAnimationFrame(()=>targetBtn.scrollIntoView({block:'center',behavior:'auto'}));
  }
}
function renderContinue(){
  const btn=document.getElementById('continueBtn');
  if(!btn)return; // 橫幅已移除；接續改由關卡格的「續」標記呈現
  const t=continueTarget();
  if(!t){btn.style.display='none';return;}
  const dn=DIFFS[t.di].name;
  const where=t.mode==='infinite'?'無限練習':`第 ${t.level} 關`;
  let title,tail;
  if(t.kind==='resume'){title='▶ 繼續上次那局';tail=`已用 ${fmt(t.elapsed)}`;}
  else{
    title='▶ 接續上次';
    const done=progress[t.di]&&progress[t.di][t.level];
    tail=done?`已破・最佳 ${fmt(done.time)}`:'繼續挑戰';
  }
  document.getElementById('continueTitle').textContent=title;
  document.getElementById('continueSub').textContent=`${dn}・${where}・${tail}`;
  btn.style.display='block';
}

/* ============ 遊戲流程 ============ */
// forceNew=true 代表「重來」，忽略存檔重新生成
function startGame(di,level,mode,seedOverride,forceNew){
  show('game');
  if(mode==='levels')markLastPlayed(di,level);   // 記最後玩的那一關（供「接續上次」）
  // 闖關模式：若這一關有玩到一半的存檔，直接接續（除非按了重來）
  if(mode==='levels'&&!forceNew){
    const snap=inProgress[lvKey(di,level)];
    if(snap){resumeGame(snap);return;}
  }
  document.getElementById('loading').classList.add('show');
  document.getElementById('board').innerHTML='';
  // 延一格讓 loading 先畫出來，再做（可能較重）運算
  setTimeout(()=>{
    const seed=mode==='infinite'?(seedOverride>>>0):levelSeed(di,level);
    const {puzzle,solution}=generate(di,seed);
    const N=DIFFS[di].size,[bh,bw]=SIZES[N];
    S={di,level,mode,seed,puzzle,solution,N,bh,bw,
       values:puzzle.slice(),notes:Array.from({length:N*N},()=>[]),
       sel:-1,mist:0,hints:0,elapsed:0,notesMode:false,done:false,history:[]};
    document.getElementById('loading').classList.remove('show');
    buildBoard();buildPad();refreshHeader();startTimer();updateTools();saveCurrent();
  },30);
}
// 重來這一局：清掉存檔，重新生成同一關
function restartGame(){
  if(!S)return;
  if(!confirm('重來這一關？目前的進度會清掉。'))return;
  const {di,level,mode,seed}=S;
  clearInterval(timerId);
  if(mode==='levels'){delete inProgress[lvKey(di,level)];persistIP();startGame(di,level,'levels',null,true);}
  else startGame(curDiff,0,'infinite',(Date.now()^Math.floor(Math.random()*1e9))>>>0);
}
function resumeGame(sv){
  const N=DIFFS[sv.di]?DIFFS[sv.di].size:9;
  // 舊版存檔尺寸不符（難度分級改過）→ 丟棄，改新開這一關，避免用錯尺寸盤面壞掉
  if(!sv||!sv.puzzle||sv.puzzle.length!==N*N||typeof DIFFS[sv.di]==='undefined'){
    if(sv&&sv.mode==='levels'){delete inProgress[lvKey(sv.di,sv.level)];persistIP();}
    localStorage.removeItem(LS.cur);
    startGame(sv&&typeof sv.di==='number'?sv.di:0, sv&&sv.level?sv.level:1, sv&&sv.mode==='infinite'?'infinite':'levels', sv&&sv.seed, true);
    return;
  }
  show('game');
  if(sv.mode==='levels')markLastPlayed(sv.di,sv.level);
  const [bh,bw]=SIZES[N];
  S={di:sv.di,level:sv.level,mode:sv.mode,seed:sv.seed,puzzle:sv.puzzle,solution:sv.solution,N,bh,bw,
     values:sv.values,notes:sv.notes,sel:-1,mist:sv.mist,hints:sv.hints,elapsed:sv.elapsed,
     notesMode:false,done:false,history:[]};
  buildBoard();buildPad();refreshHeader();startTimer();updateTools();
}
function refreshHeader(){
  document.getElementById('gTitle').textContent=DIFFS[S.di].name;
  document.getElementById('gSub').textContent=S.mode==='infinite'?'無限練習':`第 ${S.level} 關`;
  document.getElementById('gMist').textContent='錯誤 '+S.mist+(settings.limitMist?' / 3':'');
}
function startTimer(){
  clearInterval(timerId);
  document.getElementById('gTimer').textContent=fmt(S.elapsed);
  timerId=setInterval(()=>{
    if(document.hidden||S.done)return;
    S.elapsed+=1000;document.getElementById('gTimer').textContent=fmt(S.elapsed);
    if(S.elapsed%5000===0)saveCurrent();
  },1000);
}

/* ---- 棋盤（尺寸相關只動結構：格數/宮線/字級縮放，顏色一律沿用現有變數） ---- */
function buildBoard(){
  coachHide();
  const N=S.N,bh=S.bh,bw=S.bw;
  const board=document.getElementById('board');board.innerHTML='';
  board.style.gridTemplateColumns=`repeat(${N},1fr)`;
  board.style.gridTemplateRows=`repeat(${N},1fr)`;
  board.style.setProperty('--cf',`min(${(57.6/N).toFixed(1)}vw, ${Math.round(306/N)}px)`); // 字級隨 N 縮放
  for(let i=0;i<N*N;i++){
    const c=document.createElement('div');
    const r=(i/N|0),col=i%N;
    c.className='cell';c.dataset.i=i;
    // 宮的粗線：在宮邊界的格子右/下加 --line-strong（沿用既有變數，非新視覺）
    const sh=[];
    if((col+1)%bw===0&&col<N-1)sh.push('inset -2px 0 0 var(--line-strong)');
    if((r+1)%bh===0&&r<N-1)sh.push('inset 0 -2px 0 var(--line-strong)');
    if(sh.length)c.style.boxShadow=sh.join(',');
    c.onclick=()=>selectCell(i);
    board.appendChild(c);
  }
  renderCells();
}
function renderCells(){
  const N=S.N,bh=S.bh,bw=S.bw,boxCols=N/bw;
  const boxOf=p=>Math.floor((p/N|0)/bh)*boxCols+Math.floor((p%N)/bw);
  const cells=document.getElementById('board').children;
  const selVal=S.sel>=0?S.values[S.sel]:0;
  const selR=S.sel>=0?(S.sel/N|0):-1, selC=S.sel>=0?S.sel%N:-1;
  const selB=S.sel>=0?boxOf(S.sel):-1;
  const noteCols=N<=4?2:3;
  for(let i=0;i<N*N;i++){
    const cell=cells[i];const v=S.values[i];const fixed=S.puzzle[i]!==0;
    const r=(i/N|0),c=i%N,b=boxOf(i);
    let cls='cell';
    if(fixed)cls+=' fixed';
    if(S.hintCells&&S.hintCells.has(i))cls+=' hintv';
    if(S.sel>=0&&i!==S.sel&&(r===selR||c===selC||b===selB))cls+=' peer';
    if(selVal&&v===selVal&&i!==S.sel)cls+=' same';
    if(i===S.sel)cls+=' sel';
    if(S.coachCells&&S.coachCells.includes(i))cls+=' coachhi';
    if(settings.showErr&&v!==0&&!fixed&&v!==S.solution[i])cls+=' wrong';
    cell.className=cls;
    if(v!==0){cell.textContent=v;}
    else{
      cell.textContent='';
      if(S.notes[i]&&S.notes[i].length){
        const nb=document.createElement('div');nb.className='notes';
        nb.style.gridTemplateColumns=`repeat(${noteCols},1fr)`;
        for(let n=1;n<=N;n++){const s=document.createElement('span');s.textContent=S.notes[i].includes(n)?n:'';nb.appendChild(s);}
        cell.appendChild(nb);
      }
    }
  }
}
function selectCell(i){S.sel=i;renderCells();}

/* ---- 數字盤（1..N） ---- */
function buildPad(){
  const N=S.N;const pad=document.getElementById('pad');pad.innerHTML='';
  pad.style.gridTemplateColumns=`repeat(${N},1fr)`;
  for(let n=1;n<=N;n++){
    const b=document.createElement('button');
    b.className='num';b.dataset.n=n;
    b.innerHTML=`${n}<span class="rem"></span>`;
    b.onclick=()=>inputNumber(n);
    pad.appendChild(b);
  }
  updatePad();
}
function updatePad(){
  const N=S.N;const counts=new Array(N+1).fill(0);
  for(let i=0;i<N*N;i++)if(S.values[i])counts[S.values[i]]++;
  const pad=document.getElementById('pad').children;
  for(let n=1;n<=N;n++){
    pad[n-1].querySelector('.rem').textContent=Math.max(0,N-counts[n])||'';
    pad[n-1].classList.toggle('done',counts[n]>=N);
  }
}

/* ---- 輸入 ---- */
function pushHistory(){
  S.history.push({values:S.values.slice(),notes:S.notes.map(a=>a.slice()),
    hintCells:S.hintCells?[...S.hintCells]:[],mist:S.mist});
  if(S.history.length>250)S.history.shift();
}
function inputNumber(n){
  if(S.done||S.sel<0)return;
  const i=S.sel;
  if(S.puzzle[i]!==0)return; // 題目給定不可改
  if(S.coach||S.coachCells)coachHide();
  if(S.notesMode){
    pushHistory();
    if(S.values[i]!==0)S.values[i]=0;
    const arr=S.notes[i];const k=arr.indexOf(n);
    if(k>=0)arr.splice(k,1);else arr.push(n);
    renderCells();saveCurrent();updateTools();return;
  }
  pushHistory();
  if(S.values[i]===n){S.values[i]=0;} // 再按一次取消
  else{
    S.values[i]=n;S.notes[i]=[];
    if(S.hintCells)S.hintCells.delete(i);
    if(n!==S.solution[i]){
      S.mist++;refreshHeader();
      if(settings.limitMist&&S.mist>=3){renderCells();updatePad();updateTools();gameOver();return;}
    }else if(settings.autoNote){
      const r=(i/9|0),c=i%9,br=(r/3|0)*3,bc=(c/3|0)*3;
      for(let k=0;k<9;k++){removeNote(r*9+k,n);removeNote(k*9+c,n);}
      for(let a=0;a<3;a++)for(let b=0;b<3;b++)removeNote((br+a)*9+(bc+b),n);
    }
  }
  renderCells();updatePad();updateTools();saveCurrent();checkWin();
}
function removeNote(idx,n){const arr=S.notes[idx];if(!arr)return;const k=arr.indexOf(n);if(k>=0)arr.splice(k,1);}
function eraseCell(){
  if(S.done||S.sel<0)return;const i=S.sel;if(S.puzzle[i]!==0)return;
  if(S.values[i]===0&&(!S.notes[i]||!S.notes[i].length))return;
  if(S.coach||S.coachCells)coachHide();
  pushHistory();S.values[i]=0;S.notes[i]=[];if(S.hintCells)S.hintCells.delete(i);
  renderCells();updatePad();updateTools();saveCurrent();
}
function undo(){
  if(S.done||!S.history.length)return;
  if(S.coach||S.coachCells)coachHide();
  const h=S.history.pop();
  S.values=h.values;S.notes=h.notes;S.mist=h.mist;S.hintCells=new Set(h.hintCells);
  refreshHeader();renderCells();updatePad();updateTools();saveCurrent();
}
function toggleNotes(){S.notesMode=!S.notesMode;updateTools();}
/* ---- 教練式提示：指方向 → 講理由 → 指格＋答案（第0層先擋填錯）---- */
function boxPos(p){const N=S.N,bh=S.bh,bw=S.bw;
  const cn=(N/bw===2)?['左','右']:['左','中','右'];
  const rn=(N/bh===2)?['上','下']:['上','中','下'];
  return cn[Math.floor((p%N)/bw)]+rn[Math.floor((p/N|0)/bh)]+'宮';}
// 該格所在「宮」的所有格（依當前尺寸算，供教練高亮）
function boxCellsOf(p){const N=S.N,bh=S.bh,bw=S.bw;
  const br=Math.floor((p/N|0)/bh)*bh,bc=Math.floor((p%N)/bw)*bw;
  const a=[];for(let i=0;i<bh;i++)for(let j=0;j<bw;j++)a.push((br+i)*N+(bc+j));return a;}
function describeUnit(h){
  if(!h.unit||h.unit.kind==='宮')return boxPos(h.p);
  if(h.unit.kind==='列')return '第'+((h.p/S.N|0)+1)+'列（橫排）';
  return '第'+(h.p%S.N+1)+'行（直排）';
}
function coachSay(html,warn){const el=document.getElementById('coachBar');
  el.hidden=false;el.className='coach'+(warn?' warn':'');
  el.innerHTML='<span class="ic">'+(warn?'⚠️':'🧭')+'</span><span class="tx">'+html+'</span>';}
function coachHide(){const el=document.getElementById('coachBar');if(el)el.hidden=true;if(S){S.coach=null;S.coachCells=null;}}
function findWrong(){const T=S.N*S.N;for(let i=0;i<T;i++)if(S.puzzle[i]===0&&S.values[i]!==0&&S.values[i]!==S.solution[i])return i;return -1;}
function hint(){
  if(S.done)return;
  // 第0層：盤面有填錯先擋，不給假線索
  const w=findWrong();
  if(w>=0){S.coach=null;S.coachCells=[w];
    coachSay('先等一下——你有一格<b>填錯了</b>（在「'+boxPos(w)+'」那區）。先把它擦掉再繼續，不然會卡住喔。',true);
    renderCells();return;}
  const h=nextHint(S.values);
  if(!h){coachSay('這一題目前沒有可以再推的空格了。');return;}
  const key=h.p+':'+h.n;
  const layer=(S.coach&&S.coach.key===key)?Math.min(3,S.coach.layer+1):1;
  S.coach={key,layer};
  const unit=describeUnit(h);
  // 方向/理由層高亮整個「區域」（裸單元素→該格所在的宮，依當前尺寸算），指格層才只亮那一格
  const region=h.unit?h.unit.cells.slice():boxCellsOf(h.p);
  if(layer===1){
    S.coachCells=region;
    coachSay((h.needLocked?'這一步要先用「<b>區塊排除</b>」。先看看':'先看看')+'「<b>'+unit+'</b>」，答案就在這一區裡。');
  }else if(layer===2){
    S.coachCells=region;
    let reason=h.tier===1
      ? '這一區裡有一格，把它的<b>同一橫排、同一直行、還有它這一宮</b>合起來看，1~9 裡除了 <b>'+h.n+'</b> 以外的數字全都出現過了，所以它只能是 <b>'+h.n+'</b>。'
      : '在「<b>'+unit+'</b>」裡，數字 <b>'+h.n+'</b> 只剩一個位置放得下——別的空格，都因為它們的橫排或直行上已經有 '+h.n+' 而放不下。';
    if(h.needLocked)reason='先用「<b>區塊排除</b>」：找一個宮，裡面的 '+h.n+' 剛好被逼在同一排上，就能把那一排其他格的 '+h.n+' 劃掉。之後你會發現——'+reason;
    coachSay(reason);
  }else{
    // 永不代填（品牌鐵則）：指出格子＋數字，但讓玩家自己按進去
    S.coachCells=[h.p];S.sel=h.p;
    coachSay('就是<b>亮起來這一格</b>，換你把 <b>'+h.n+'</b> 填進去——自己填才算學會 💪');
    S.hints++;S.coach=null;
    saveCurrent();
  }
  renderCells();updateTools();
}
function updateTools(){
  document.getElementById('notesBtn').classList.toggle('on',S.notesMode);
  document.getElementById('notesLabel').textContent='筆記 '+(S.notesMode?'開':'關');
  document.getElementById('undoBtn').disabled=!S.history.length;
}

/* ---- 勝負 ---- */
function checkWin(){
  for(let i=0;i<81;i++)if(S.values[i]!==S.solution[i])return;
  S.done=true;clearInterval(timerId);
  // 記錄闖關成績
  if(S.mode==='levels'){
    if(!progress[S.di])progress[S.di]={};
    const prev=progress[S.di][S.level];
    if(!prev||S.elapsed<prev.time)progress[S.di][S.level]={time:S.elapsed,mist:S.mist};
    saveProgress();
  }
  clearSaved();
  document.getElementById('winTime').textContent=fmt(S.elapsed);
  document.getElementById('winMist').textContent=S.mist;
  document.getElementById('winHint').textContent=S.hints;
  document.getElementById('winTitle').textContent=S.hints===0&&S.mist===0?'完美通關！':'完成！';
  document.getElementById('winSub').textContent=S.mode==='infinite'?'又練了一題':`${DIFFS[S.di].name}・第 ${S.level} 關`;
  document.getElementById('winNext').textContent=S.mode==='infinite'?'再來一題 →':'下一關 →';
  document.getElementById('winOverlay').classList.add('show');
}
function gameOver(){
  clearSaved();S.done=true;clearInterval(timerId);
  document.getElementById('winTitle').textContent='錯太多次了';
  document.getElementById('winSub').textContent='再試一次就好，別氣餒！';
  document.querySelector('#winOverlay .emoji').textContent='😅';
  document.getElementById('winTime').textContent=fmt(S.elapsed);
  document.getElementById('winMist').textContent=S.mist;
  document.getElementById('winHint').textContent=S.hints;
  document.getElementById('winNext').textContent='重玩本關';
  document.getElementById('winNext').dataset.retry='1';
  document.getElementById('winOverlay').classList.add('show');
}

/* ============ 事件綁定 ============ */
function bind(){
  document.getElementById('backBtn').onclick=()=>{saveCurrent();clearInterval(timerId);goHome();};
  document.getElementById('restartBtn').onclick=restartGame;
  document.getElementById('undoBtn').onclick=undo;
  document.getElementById('eraseBtn').onclick=eraseCell;
  document.getElementById('notesBtn').onclick=toggleNotes;
  document.getElementById('hintBtn').onclick=hint;
  const _cb=document.getElementById('continueBtn');
  if(_cb)_cb.onclick=()=>{
    const t=continueTarget();if(!t)return;
    if(t.mode!=='infinite'&&typeof t.di==='number'){curDiff=t.di;renderDiffs();}
    if(t.kind==='resume')resumeGame(t.snap);
    else startGame(t.di,t.level,'levels'); // 有半局存檔會自動接續，否則新開該關
  };
  document.getElementById('infiniteStart').onclick=()=>startGame(curDiff,0,'infinite',(Date.now()^Math.floor(Math.random()*1e9))>>>0);
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    curTab=t.dataset.mode;
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('sel',x===t));
    document.getElementById('levelsView').style.display=curTab==='levels'?'block':'none';
    document.getElementById('infiniteView').style.display=curTab==='infinite'?'block':'none';
  });
  // win
  document.getElementById('winHome').onclick=()=>{document.getElementById('winOverlay').classList.remove('show');resetWinCard();goHome();};
  document.getElementById('winNext').onclick=()=>{
    const ov=document.getElementById('winOverlay');ov.classList.remove('show');
    const retry=document.getElementById('winNext').dataset.retry;resetWinCard();
    if(retry)startGame(S.di,S.level,S.mode,S.seed);
    else if(S.mode==='infinite')startGame(curDiff,0,'infinite',(Date.now()^Math.floor(Math.random()*1e9))>>>0);
    else startGame(S.di,S.level+1,'levels');
  };
  // settings
  document.getElementById('openSettings').onclick=()=>{syncSwitches();document.getElementById('settingsOverlay').classList.add('show');};
  document.getElementById('closeSettings').onclick=()=>document.getElementById('settingsOverlay').classList.remove('show');
  const sw=(id,key)=>{document.getElementById(id).onclick=()=>{settings[key]=!settings[key];saveSettings();syncSwitches();if(S&&!S.done)renderCells(),refreshHeader();};};
  sw('swErr','showErr');sw('swAuto','autoNote');sw('swLimit','limitMist');
  document.getElementById('resetProgress').onclick=()=>{
    if(confirm('確定要清除所有闖關進度與紀錄嗎？')){progress={};inProgress={};shownByDiff={};saveProgress();persistIP();localStorage.removeItem(LS.cur);localStorage.removeItem(LS.last);renderLevels();renderContinue();}
  };
  // 鍵盤（iPad 外接鍵盤 / 桌機測試）
  document.addEventListener('keydown',e=>{
    if(document.getElementById('game').classList.contains('active')&&S&&!S.done){
      const N=S.N;
      if(e.key>='1'&&e.key<=String(N))inputNumber(+e.key);
      else if(e.key==='Backspace'||e.key==='0'||e.key==='Delete')eraseCell();
      else if(e.key==='n'||e.key==='N')toggleNotes();
      else if(e.key==='h'||e.key==='H')hint();
      else if(e.key.startsWith('Arrow')&&S.sel>=0){
        let r=(S.sel/N|0),c=S.sel%N;
        if(e.key==='ArrowUp')r=(r+N-1)%N;if(e.key==='ArrowDown')r=(r+1)%N;
        if(e.key==='ArrowLeft')c=(c+N-1)%N;if(e.key==='ArrowRight')c=(c+1)%N;
        selectCell(r*N+c);e.preventDefault();
      }
    }
  });
  document.addEventListener('visibilitychange',()=>{if(document.hidden)saveCurrent();});
  window.addEventListener('pagehide',saveCurrent);
}
function resetWinCard(){
  document.querySelector('#winOverlay .emoji').textContent='🎉';
  delete document.getElementById('winNext').dataset.retry;
}
function syncSwitches(){
  document.getElementById('swErr').classList.toggle('on',settings.showErr);
  document.getElementById('swAuto').classList.toggle('on',settings.autoNote);
  document.getElementById('swLimit').classList.toggle('on',settings.limitMist);
}
function goHome(){show('home');renderLevels();renderContinue();}

/* ---- 一次性遷移：多尺寸(v9)把難度由 4→6 rungs 造成舊 di 位移，
   把舊 di 0→2 / 1→3 / 2→4 / 3→5 重映射（舊 簡單/中等/困難/專家 → 新對應階梯）。
   remap 前整包備份到 .bak.dimigrate（回滾保險）；只跑一次。 ---- */
function migrateDiIndices(){
  if(localStorage.getItem('sudoku.dimigrated.v1'))return;
  const R={0:2,1:3,2:4,3:5};
  ['prog','cur','ip','last'].forEach(k=>{const v=localStorage.getItem(LS[k]);if(v!=null)localStorage.setItem(LS[k]+'.bak.dimigrate',v);});
  try{const p=JSON.parse(localStorage.getItem(LS.prog));
    if(p&&typeof p==='object'){const np={};for(const k in p){const nd=(k in R)?R[k]:k;np[nd]=p[k];}localStorage.setItem(LS.prog,JSON.stringify(np));}}catch(e){}
  try{const ip=JSON.parse(localStorage.getItem(LS.ip)); // 只 remap 9×9(舊難度都是81格)；新小盤(16/36)不動
    if(ip&&typeof ip==='object'){const nip={};for(const k in ip){const snap=ip[k];const idx=k.indexOf(':');
      const d=+k.slice(0,idx),lv=k.slice(idx+1);let nd=d;
      if((d in R)&&snap&&Array.isArray(snap.puzzle)&&snap.puzzle.length===81){nd=R[d];snap.di=nd;}
      nip[nd+':'+lv]=snap;}localStorage.setItem(LS.ip,JSON.stringify(nip));}}catch(e){}
  try{const lp=JSON.parse(localStorage.getItem(LS.last));
    if(lp&&typeof lp.di==='number'&&(lp.di in R)){lp.di=R[lp.di];localStorage.setItem(LS.last,JSON.stringify(lp));}}catch(e){}
  try{const c=JSON.parse(localStorage.getItem(LS.cur));
    if(c&&typeof c.di==='number'&&(c.di in R)&&Array.isArray(c.puzzle)&&c.puzzle.length===81){c.di=R[c.di];localStorage.setItem(LS.cur,JSON.stringify(c));}}catch(e){}
  localStorage.setItem('sudoku.dimigrated.v1','1');
}

/* ============ 啟動 ============ */
migrateDiIndices();loadStore();bind();
{const _ct=continueTarget();if(_ct&&_ct.mode!=='infinite'&&typeof _ct.di==='number')curDiff=_ct.di;}
renderDiffs();renderLevels();renderContinue();
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
